<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="star" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="50%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#fbbf24" flood-opacity="0.8"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Estrella centrada -->
  <polygon
    transform="translate(16,15)"
    points="0,-10 2.3,-3.4 9.5,-3.4 3.9,1.3 6,8.1 0,4.3 -6,8.1 -3.9,1.3 -9.5,-3.4 -2.3,-3.4"
    fill="url(#star)"
    filter="url(#glow)"/>
  <!-- Brillo -->
  <ellipse cx="13.5" cy="9" rx="2.5" ry="1.8"
    fill="white" opacity="0.4" transform="rotate(-20,13.5,9)"/>
</svg>
